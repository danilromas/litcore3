# Netlify — litcore.ai (Astro static)
# Publish MUST be dist/ (результат `astro build`), не корень репозитория.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Красивые URL со trailing slash (astro trailingSlash: 'always')
[[redirects]]
  from = "/es"
  to = "/es/"
  status = 301

[[redirects]]
  from = "/ru"
  to = "/ru/"
  status = 301

[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301

# Временные редиректы: хабы из инвентаря ещё не собраны → якоря главной
[[redirects]]
  from = "/es/servicios"
  to = "/es/#servicios"
  status = 302

[[redirects]]
  from = "/es/servicios/"
  to = "/es/#servicios"
  status = 302

[[redirects]]
  from = "/es/servicios/automatizacion"
  to = "/es/#servicios"
  status = 302

[[redirects]]
  from = "/es/servicios/automatizacion/"
  to = "/es/#servicios"
  status = 302

[[redirects]]
  from = "/es/demos"
  to = "/es/#demos"
  status = 302

[[redirects]]
  from = "/es/demos/"
  to = "/es/#demos"
  status = 302

[[redirects]]
  from = "/ru/uslugi"
  to = "/ru/#servicios"
  status = 302

[[redirects]]
  from = "/ru/uslugi/"
  to = "/ru/#servicios"
  status = 302

[[redirects]]
  from = "/ru/uslugi/avtomatizaciya"
  to = "/ru/#servicios"
  status = 302

[[redirects]]
  from = "/ru/uslugi/avtomatizaciya/"
  to = "/ru/#servicios"
  status = 302

[[redirects]]
  from = "/ru/demo"
  to = "/ru/#demo"
  status = 302

[[redirects]]
  from = "/ru/demo/"
  to = "/ru/#demo"
  status = 302
