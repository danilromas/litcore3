<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 780" role="img"
     aria-labelledby="lc-logo-title lc-logo-desc">
  <title id="lc-logo-title">litcore.ai — лого-лист: знак «ядро / núcleo»</title>
  <desc id="lc-logo-desc">Оранжевая точка с тонким орбитальным кольцом и малым орбитальным узлом.
    Варианты: знак соло, знак со словесным litcore.ai, инверсия для тёмного холста, фавикон 32×32.
    Геометрия знака — чистые фигуры, без шрифтов; подписи — текстом.</desc>

  <defs>
    <!-- Свечение кольца на тёмном холсте (cyan) -->
    <filter id="glow-cyan" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <!-- Свечение точки-ядра на тёмном холсте (accent) -->
    <filter id="glow-red" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Бумага -->
  <rect width="1080" height="780" fill="#F1EDE2"/>

  <!-- Шапка листа -->
  <text x="48" y="52" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="2"
        fill="#6F6A5D">LITCORE.AI — ЛОГО-ЛИСТ · ЗНАК «ЯДРО / NÚCLEO» · V3 · 09.07.2026</text>
  <text x="48" y="74" font-family="IBM Plex Mono, monospace" font-size="11" letter-spacing="1.5"
        fill="#6F6A5D">КОНСТРУКЦИЯ = МОТИВ .CORE: ТОЧКА 26% КОЛЬЦА · УЗЕЛ 14% · ШТРИХ 3.6% · НАКАЛ КОЛЬЦА 55%</text>
  <line x1="48" y1="92" x2="1032" y2="92" stroke="#DEDDD6" stroke-width="1"/>

  <!-- ================= A · ЗНАК СОЛО ================= -->
  <!-- size 160: R=80, штрих 5.8, точка r=20.8, узел r=11.4 (на кольце сверху) -->
  <g>
    <circle cx="200" cy="240" r="80" fill="none" stroke="#E23A2E" stroke-opacity="0.55" stroke-width="5.8"/>
    <circle cx="200" cy="240" r="20.8" fill="#E23A2E"/>
    <circle cx="200" cy="160" r="11.4" fill="#E23A2E"/>
    <!-- охранное поле = R кольца (служебная разметка) -->
    <rect x="40" y="80" width="320" height="320" fill="none" stroke="#DEDDD6"
          stroke-width="1" stroke-dasharray="4 6"/>
  </g>
  <text x="48" y="386" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="1.8"
        fill="#141310">A · ЗНАК СОЛО</text>
  <text x="48" y="404" font-family="IBM Plex Mono, monospace" font-size="10.5" letter-spacing="1.2"
        fill="#6F6A5D">ОХРАННОЕ ПОЛЕ (ПУНКТИР) = РАДИУС КОЛЬЦА · МИНИМУМ 24PX</text>

  <!-- ================= B · ЗНАК + СЛОВЕСНЫЙ ================= -->
  <!-- core 56: R=28, штрих 2, точка r=7.3, узел r=4 -->
  <g>
    <circle cx="452" cy="232" r="28" fill="none" stroke="#E23A2E" stroke-opacity="0.55" stroke-width="2"/>
    <circle cx="452" cy="232" r="7.3" fill="#E23A2E"/>
    <circle cx="452" cy="204" r="4" fill="#E23A2E"/>
    <text x="498" y="252" font-family="Manrope, sans-serif" font-weight="800" font-size="60"
          letter-spacing="-1.2" fill="#141310">litcore<tspan fill="#6F6A5D" font-weight="600">.ai</tspan></text>
  </g>
  <text x="420" y="322" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="1.8"
        fill="#141310">B · ЗНАК + СЛОВЕСНЫЙ</text>
  <text x="420" y="340" font-family="IBM Plex Mono, monospace" font-size="10.5" letter-spacing="1.2"
        fill="#6F6A5D">MANROPE 800 · «.AI» ПРИГЛУШЁН #6F6A5D · ЗАЗОР = R КОЛЬЦА</text>
  <text x="420" y="356" font-family="IBM Plex Mono, monospace" font-size="10.5" letter-spacing="1.2"
        fill="#6F6A5D">ДЛЯ ПЕЧАТИ/OG — ОБРИСОВАТЬ ТЕКСТ В КРИВЫЕ</text>

  <!-- ================= C · ИНВЕРСИЯ ДЛЯ ТЁМНОГО ХОЛСТА ================= -->
  <g>
    <rect x="48" y="430" width="460" height="250" rx="16" fill="#0A0C11"/>
    <!-- core 110: R=55, штрих 4, точка r=14.3, узел r=7.9 -->
    <!-- слой свечения кольца (cyan) -->
    <circle cx="150" cy="545" r="55" fill="none" stroke="#63E1FF" stroke-opacity="0.5"
            stroke-width="7" filter="url(#glow-cyan)"/>
    <circle cx="150" cy="545" r="55" fill="none" stroke="#63E1FF" stroke-opacity="0.6" stroke-width="4"/>
    <!-- точка-ядро остаётся accent, со свечением -->
    <circle cx="150" cy="545" r="14.3" fill="#E23A2E" opacity="0.85" filter="url(#glow-red)"/>
    <circle cx="150" cy="545" r="14.3" fill="#E23A2E"/>
    <circle cx="150" cy="490" r="7.9" fill="#E23A2E"/>
    <text x="228" y="560" font-family="Manrope, sans-serif" font-weight="800" font-size="40"
          letter-spacing="-0.8" fill="#EAF2F5">litcore<tspan fill="#9BA6B2" font-weight="600">.ai</tspan></text>
  </g>
  <text x="48" y="706" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="1.8"
        fill="#141310">C · ИНВЕРСИЯ · ТЁМНЫЙ ХОЛСТ «ФИЛАМЕНТ» #0A0C11</text>
  <text x="48" y="724" font-family="IBM Plex Mono, monospace" font-size="10.5" letter-spacing="1.2"
        fill="#6F6A5D">КОЛЬЦО — GLOW-CYAN #63E1FF СО СВЕЧЕНИЕМ · ТОЧКА ОСТАЁТСЯ #E23A2E</text>

  <!-- ================= D · ФАВИКОН 32×32 ================= -->
  <g>
    <!-- натуральный размер 32×32: только точка + кольцо, накал 100% для читаемости -->
    <g transform="translate(576,470)">
      <rect x="-8" y="-8" width="48" height="48" rx="8" fill="#FFFFFF" stroke="#DEDDD6"/>
      <circle cx="16" cy="16" r="13" fill="none" stroke="#E23A2E" stroke-width="2.5"/>
      <circle cx="16" cy="16" r="4.2" fill="#E23A2E"/>
    </g>
    <!-- тёмный вариант 32×32 -->
    <g transform="translate(652,470)">
      <rect x="-8" y="-8" width="48" height="48" rx="8" fill="#0A0C11"/>
      <circle cx="16" cy="16" r="13" fill="none" stroke="#63E1FF" stroke-width="2.5"/>
      <circle cx="16" cy="16" r="4.2" fill="#E23A2E"/>
    </g>
    <!-- увеличение 4× (128) для проверки геометрии -->
    <g transform="translate(760,438)">
      <rect x="-12" y="-12" width="152" height="152" rx="16" fill="#FFFFFF" stroke="#DEDDD6"/>
      <circle cx="64" cy="64" r="52" fill="none" stroke="#E23A2E" stroke-width="10"/>
      <circle cx="64" cy="64" r="16.6" fill="#E23A2E"/>
      <line x1="64" y1="12" x2="64" y2="116" stroke="#DEDDD6" stroke-width="1" stroke-dasharray="3 5"/>
      <line x1="12" y1="64" x2="116" y2="64" stroke="#DEDDD6" stroke-width="1" stroke-dasharray="3 5"/>
    </g>
  </g>
  <text x="560" y="616" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="1.8"
        fill="#141310">D · ФАВИКОН 32×32 · ТОЛЬКО ТОЧКА + КОЛЬЦО</text>
  <text x="560" y="634" font-family="IBM Plex Mono, monospace" font-size="10.5" letter-spacing="1.2"
        fill="#6F6A5D">БЕЗ УЗЛА · НАКАЛ КОЛЬЦА 100% ДЛЯ ЧИТАЕМОСТИ МАЛОГО РАЗМЕРА</text>
  <text x="560" y="650" font-family="IBM Plex Mono, monospace" font-size="10.5" letter-spacing="1.2"
        fill="#6F6A5D">СПРАВА — 4× ДЛЯ ПРОВЕРКИ: ТОЧКА 26% · ШТРИХ ≈8%</text>

  <!-- Подвал листа -->
  <line x1="48" y1="742" x2="1032" y2="742" stroke="#DEDDD6" stroke-width="1"/>
  <text x="48" y="762" font-family="IBM Plex Mono, monospace" font-size="10.5" letter-spacing="1.2"
        fill="#6F6A5D">ЗНАК — ЧИСТАЯ ГЕОМЕТРИЯ БЕЗ ШРИФТОВ · В ВЕБЕ УЗЕЛ ВРАЩАЕТСЯ: CSS .CORE .ORBIT · ПЕРИОД 9S · REDUCED-MOTION → СТАТИКА</text>
</svg>
